spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wellness_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:your_email@example.com}
    password: ${MAIL_PASSWORD:your_password_here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

jwt:
  secret: ${JWT_SECRET:secret}
  expirationMs: 86400000

stripe:
  apiKey: ${STRIPE_API_KEY:sk_test_dummy_key}

twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
  auth:
    token: ${TWILIO_AUTH_TOKEN:your_auth_token_here}
  phone:
    number: ${TWILIO_PHONE_NUMBER:+1XXXXXXXXXX}
